<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Construtor Project — plataforma de projetos e modelos 3D de construção civil.">
  <title>{% block title %}Construtor Project{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ url_for('main.home') }}" class="brand">
        <span class="brand-icon">⬡</span> Construtor Project
      </a>
      <nav aria-label="Navegação principal">
        <a href="{{ url_for('main.home') }}"{% if request.endpoint == 'main.home' %} class="active"{% endif %}>Início</a>
        <a href="{{ url_for('catalog.index') }}"{% if request.endpoint and request.endpoint.startswith('catalog.') %} class="active"{% endif %}>Projetos</a>
        <a href="{{ url_for('models3d.index') }}"{% if request.endpoint and request.endpoint.startswith('models3d.') %} class="active"{% endif %}>Modelos 3D</a>
        <a href="{{ url_for('main.about') }}"{% if request.endpoint == 'main.about' %} class="active"{% endif %}>Sobre</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>© 2025 Construtor Project — Engenharia & Design 3D</p>
  </footer>
</body>
</html>
